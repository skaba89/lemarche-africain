# ============================================================
# Le Marché Africain — Docker Compose
# ============================================================

services:
  # ─── Production ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
    volumes:
      - app-data:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Seed (one-shot, runs after app starts) ────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["node", "-e", "const { execSync } = require('child_process'); execSync('npx prisma db push --skip-generate && npx prisma db seed', { stdio: 'inherit' });"]
    environment:
      - DATABASE_URL=file:/app/db/custom.db
    volumes:
      - app-data:/app/db
    depends_on:
      app:
        condition: service_started

volumes:
  app-data:
